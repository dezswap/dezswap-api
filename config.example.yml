indexer:
  chain_id: cube_47-5
  src_node:
    host: 10.0.0.1
    port: 9090
    factory:
  src_evm_rpc_endpoint: "http://10.0.0.1:8545"
  src_db:
    host: localhost
    port: 5432
    database: dezswap_api
    username: app
    password: appPW
  db:
    host: localhost
    port: 5432
    database: dezswap_api
    username: app
    password: appPW

log:
  level: debug
  format_json: true
  env:

sentry:
  dsn:

api:
  server:
    name: dezswap-api
    host: 0.0.0.0
    port: 8000
    swagger: false
    mod: release # test, debug, release
    version:
    chain_id:
    coingecko_api_key: ""  # CoinGecko demo API key (x-cg-demo-api-key header)
    cors_allowed_origins:
      - '\.dezswap\.io$'
      - 'dezswap\.netlify\.app$'
      - '^https?:\/\/localhost(:\d+)?$'
    mcp:
      enabled: false
      path: /mcp
      base_url: ""
      allowed_origins: []
      include_operations: []
      request_timeout_ms: 10000
      response_max_bytes: 1048576
  db:
    host: localhost
    port: 5432
    database: dezswap_api
    username: app
    password: appPW
  # request cache for api
  cache:
    memory_cache: true # true, false it indicates whether to use in-memory cache
    redis: # optional
      host: localhost
      port: 6379
      user: default
      password: appPW
      db: 0 # optional redis db index default is 0
      protocol: 3 # optional redis protocol index default is 3
      tls_enabled: true # optional redis tls enabled default is false
